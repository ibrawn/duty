<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeeRPG - Admin Duty Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --see-bg: #121318;
  --see-card: #1a1c23;
  --see-card-inner: #22252f;
  --see-border: #2d313f;
  --see-gold: #ffc107;
  --see-gold-hover: #e0a800;
  --see-text: #ffffff;
  --see-text-muted: #8a8f9e;
  --see-danger: #ff4a4a;
  --see-success: #2ecc71;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
body { 
  background-color: var(--see-bg); 
  color: var(--see-text); 
  padding: 30px 20px; 
  min-height: 100vh;
  background-image: radial-gradient(circle at 50% 0%, #1c1e26 0%, #121318 70%);
}

.ucp-container { max-width: 1400px; margin: 0 auto; display: none; }

header { 
  background: var(--see-card); 
  border: 1px solid var(--see-border);
  border-radius: 12px;
  padding: 18px 24px;
  margin-bottom: 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { 
  font-size: 20px; 
  font-weight: 700; 
  letter-spacing: 0.5px; 
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
header h1 span { color: var(--see-gold); }

.header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.ucp-logo-badge {
  background: var(--see-gold);
  color: #000;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 800;
  font-size: 12px;
}

.logout-btn {
  background: transparent;
  border: 1px solid var(--see-danger);
  color: var(--see-danger);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.logout-btn:hover {
  background: var(--see-danger);
  color: #fff;
}

.see-grid-stats { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
  gap: 20px; 
  margin-bottom: 25px;
